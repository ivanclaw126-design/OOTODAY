<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OOTODAY 问卷图片单选反馈</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #fbfaf7;
        --panel: #ffffff;
        --ink: #202629;
        --muted: #6c7478;
        --line: #d9dfdd;
        --soft: #f3f1eb;
        --accent: #8f6f3f;
        --accent-soft: #efe5d4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.45;
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 64px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        margin: 0 -16px 20px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--paper) 92%, transparent);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(26px, 4vw, 42px);
        letter-spacing: 0;
      }

      .lead {
        max-width: 760px;
        margin: 0;
        color: var(--muted);
        font-size: 15px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 40px;
        border: 1px solid var(--ink);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--ink);
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border-color: var(--line);
        background: #fff;
        color: var(--ink);
      }

      .count {
        color: var(--muted);
        font-size: 14px;
      }

      .section {
        margin-top: 22px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .meta {
        margin: 4px 0 16px;
        color: var(--muted);
        font-size: 13px;
      }

      .option {
        display: grid;
        grid-template-columns: minmax(168px, 220px) minmax(0, 1fr);
        gap: 14px;
        padding: 14px 0;
        border-top: 1px solid var(--line);
      }

      .option:first-of-type {
        border-top: 0;
      }

      .copy {
        display: grid;
        align-content: start;
        gap: 5px;
      }

      .copy strong {
        font-size: 17px;
      }

      .copy span {
        color: var(--muted);
        font-size: 13px;
      }

      .choices {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .choice {
        display: grid;
        gap: 9px;
        min-width: 0;
      }

      .choice input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .card {
        overflow: hidden;
        border: 2px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
        cursor: pointer;
        transition:
          border-color 120ms ease,
          box-shadow 120ms ease,
          transform 120ms ease;
      }

      .choice input:checked + .card {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .choice input:focus-visible + .card {
        outline: 3px solid var(--accent);
        outline-offset: 3px;
      }

      .thumb {
        display: block;
        width: 100%;
        height: auto;
        background: var(--soft);
      }

      .label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 38px;
        padding: 9px 10px;
        border-top: 1px solid var(--line);
        background: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .label small {
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .reject {
        height: 100%;
        min-height: 212px;
        display: grid;
        place-items: center;
        padding: 16px;
        color: var(--muted);
        text-align: center;
      }

      textarea {
        width: 100%;
        min-height: 220px;
        margin-top: 14px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        resize: vertical;
      }

      @media (max-width: 820px) {
        main {
          width: min(100vw - 20px, 1180px);
          padding-top: 16px;
        }

        .section {
          padding: 12px;
        }

        .option {
          grid-template-columns: 1fr;
        }

        .choices {
          grid-template-columns: 1fr;
        }

        .reject {
          min-height: 92px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <h1>问卷图片单选反馈</h1>
        <p class="lead">
          每个选项只能选一个结果：候选 A、候选 B、或都不合适。选择会自动保存在当前浏览器里，点“复制反馈”后直接发给我即可。
        </p>
        <div class="actions">
          <button type="button" id="copy">复制反馈</button>
          <button type="button" class="secondary" id="clear">清空选择</button>
          <span class="count" id="count">已选择 0 / 47</span>
        </div>
      </div>

      <form id="feedback"></form>
      <textarea id="summary" readonly placeholder="选择后这里会生成反馈摘要。"></textarea>
    </main>

    <script>
      const sections = [
        {
          title: "1. 场景偏好",
          slug: "scene",
          img: "./style-questionnaire-images/01-scene.png",
          rows: 5,
          options: [
            ["通勤干净", "更重视场景适配和稳定完成度"],
            ["轻松日常", "保留舒适、好穿和复穿空间"],
            ["约会/聚会", "允许更多视觉中心和造型感"],
            ["城市旅行", "更重视天气舒适和少量单品成套"],
            ["运动户外", "把天气和舒适度权重放高"]
          ]
        },
        {
          title: "2. 轮廓偏好",
          slug: "silhouette",
          img: "./style-questionnaire-images/02-silhouette.png",
          rows: 5,
          options: [
            ["上短下长", "强调腰线和比例"],
            ["上松下窄", "上半身放松，下半身收住"],
            ["上窄下宽", "上半身利落，下装更有廓形"],
            ["全身松弛", "整体宽松、舒适优先"],
            ["连衣裙/一体式", "减少上下装搭配成本"]
          ]
        },
        {
          title: "3. 色彩偏好",
          slug: "color",
          img: "./style-questionnaire-images/03-color.png",
          rows: 5,
          options: [
            ["黑白灰 / 米棕 / 藏青", "低冲突、复穿稳定"],
            ["同色系深浅", "靠颜色层次建立完整感"],
            ["柔和低饱和", "保留颜色但降低存在感"],
            ["基础色 + 一处亮色", "用一个重点提神"],
            ["高对比 / 撞色", "接受更强视觉冲突"]
          ]
        },
        {
          title: "4. 叠穿偏好",
          slug: "layering",
          img: "./style-questionnaire-images/04-layering.png",
          rows: 4,
          options: [
            ["简单两件", "尽量避免复杂叠穿"],
            ["轻外套", "接受轻量外层"],
            ["三层叠穿", "愿意用层次增强造型"],
            ["材质混搭", "接受更复杂的层次和材质变化"]
          ]
        },
        {
          title: "5. 视觉重点偏好",
          slug: "focal",
          img: "./style-questionnaire-images/05-focal-point.png",
          rows: 5,
          options: [
            ["上半身 / 脸周围", "重点靠近上半身"],
            ["腰线", "重点放在比例和腰线"],
            ["鞋子", "允许鞋子成为视觉重点"],
            ["包 / 配饰", "让包袋或配饰完成造型"],
            ["整体低调", "不强调单点抢眼"]
          ]
        },
        {
          title: "6. 实用和造型取向",
          slug: "practicality",
          img: "./style-questionnaire-images/06-practicality.png",
          rows: 4,
          options: [
            ["舒适优先", "提高天气舒适和实用性"],
            ["均衡", "保持默认平衡"],
            ["造型优先", "提高层次和视觉重点"],
            ["工作日舒适，周末造型", "在舒适和造型之间略偏完整"]
          ]
        },
        {
          title: "7. 推荐补齐项偏好",
          slug: "slot",
          img: "./style-questionnaire-images/07-slot.png",
          rows: 4,
          options: [
            ["外套", "允许推荐外层"],
            ["鞋子", "推荐尽量补齐鞋履"],
            ["包袋", "用包袋补完整度和呼应"],
            ["配饰", "允许少量配饰成为细节"]
          ]
        },
        {
          title: "8. 探索程度偏好",
          slug: "exploration",
          img: "./style-questionnaire-images/08-exploration.png",
          rows: 4,
          options: [
            ["尽量稳定", "几乎不插入灵感推荐"],
            ["一点变化", "低频尝试轻微变化"],
            ["偶尔给我灵感", "允许更明显的新鲜感"],
            ["大胆尝试", "提高探索频率，但仍保留避雷项"]
          ]
        },
        {
          title: "9. 避雷项偏好（1/2）",
          slug: "avoid1",
          img: "./style-questionnaire-images/09-hard-avoid-1.png",
          rows: 6,
          options: [
            ["不喜欢紧身", "紧身版型"],
            ["不喜欢高跟鞋", "高跟或明显抬高鞋型"],
            ["不喜欢短裙", "短下装"],
            ["不喜欢无袖", "无袖或露手臂"],
            ["不喜欢大面积亮色", "大面积高饱和色"],
            ["不喜欢复杂叠穿", "多层复杂搭配"]
          ]
        },
        {
          title: "10. 避雷项偏好（2/2）",
          slug: "avoid2",
          img: "./style-questionnaire-images/10-hard-avoid-2.png",
          rows: 5,
          options: [
            ["不喜欢露腰", "露腰 / 短上衣"],
            ["不喜欢大 logo", "大标识感"],
            ["不喜欢帽子", "帽子成为明显元素"],
            ["不喜欢太正式", "明显正式商务/礼服感"],
            ["不喜欢太运动", "明显运动感"]
          ]
        }
      ];

      const storageKey = "ootoday-style-questionnaire-image-feedback-v1";
      const form = document.querySelector("#feedback");
      const summary = document.querySelector("#summary");
      const count = document.querySelector("#count");
      const saved = JSON.parse(localStorage.getItem(storageKey) || "{}");
      const total = sections.reduce((sum, section) => sum + section.options.length, 0);

      function keyFor(sectionIndex, optionIndex) {
        return `${sectionIndex + 1}.${optionIndex + 1}`;
      }

      function card(section, sectionIndex, option, optionIndex, variant, label) {
        const key = keyFor(sectionIndex, optionIndex);
        const checked = saved[key] === variant ? "checked" : "";
        const body =
          variant === "none"
            ? `<div class="reject">都不合适<br><small>需要重做这一组选项图</small></div>`
            : `<img class="thumb" src="./style-questionnaire-crops-verified/${section.slug}-r${optionIndex + 1}-${variant.toLowerCase()}.png" alt="${section.title} ${option[0]} 候选 ${variant}" loading="lazy" />`;

        return `
          <label class="choice">
            <input type="radio" name="${key}" value="${variant}" ${checked} />
            <span class="card">
              ${body}
              <span class="label"><span>${label}</span><small>${variant === "none" ? "重做" : `选 ${variant}`}</small></span>
            </span>
          </label>
        `;
      }

      function render() {
        form.innerHTML = sections
          .map((section, sectionIndex) => {
            const options = section.options
              .map((option, optionIndex) => {
                return `
                  <div class="option">
                    <div class="copy">
                      <strong>${option[0]}</strong>
                      <span>${option[1]}</span>
                    </div>
                    <div class="choices">
                      ${card(section, sectionIndex, option, optionIndex, "A", "候选 A")}
                      ${card(section, sectionIndex, option, optionIndex, "B", "候选 B")}
                      ${card(section, sectionIndex, option, optionIndex, "none", "都不合适")}
                    </div>
                  </div>
                `;
              })
              .join("");

            return `
              <section class="section">
                <h2>${section.title}</h2>
                <p class="meta">单选反馈：每个选项在 A / B / 都不合适 中选择一个。</p>
                ${options}
              </section>
            `;
          })
          .join("");
      }

      function collect() {
        const result = {};
        const inputs = form.querySelectorAll("input[type='radio']:checked");
        inputs.forEach((input) => {
          result[input.name] = input.value;
        });
        return result;
      }

      function updateSummary() {
        const result = collect();
        Object.assign(saved, result);
        localStorage.setItem(storageKey, JSON.stringify(saved));
        const selected = Object.keys(saved).filter((key) => saved[key]).length;
        count.textContent = `已选择 ${selected} / ${total}`;

        const lines = ["OOTODAY 造型偏好问卷图片反馈："];
        sections.forEach((section, sectionIndex) => {
          lines.push("");
          lines.push(section.title);
          section.options.forEach((option, optionIndex) => {
            const key = keyFor(sectionIndex, optionIndex);
            const value = saved[key] || "未选";
            lines.push(`- ${option[0]}：${value === "none" ? "都不合适，需要重做" : value}`);
          });
        });
        summary.value = lines.join("\n");
      }

      render();
      updateSummary();

      form.addEventListener("change", updateSummary);

      document.querySelector("#copy").addEventListener("click", async () => {
        updateSummary();
        await navigator.clipboard.writeText(summary.value);
      });

      document.querySelector("#clear").addEventListener("click", () => {
        localStorage.removeItem(storageKey);
        Object.keys(saved).forEach((key) => delete saved[key]);
        form.querySelectorAll("input[type='radio']").forEach((input) => {
          input.checked = false;
        });
        updateSummary();
      });
    </script>
  </body>
</html>
