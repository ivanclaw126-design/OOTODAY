name: Recommendation Training

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing promoted scores
        required: false
        default: 'true'
      lookback_days:
        description: Interaction lookback window
        required: false
        default: '90'
      min_interactions:
        description: Minimum rows required before promotion
        required: false
        default: '50'
      promote:
        description: Allow publishing a promoted run when gates pass
        required: false
        default: 'false'
  schedule:
    - cron: '17 19 * * *'

permissions:
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '90' }}
      MIN_INTERACTIONS: ${{ github.event.inputs.min_interactions || '50' }}
      PROMOTE: ${{ github.event.inputs.promote || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ML dependencies
        run: |
          python -m pip install 'pip<25' setuptools wheel
          python -m pip install 'numpy>=1.26,<2.0' 'scipy>=1.11,<1.13' 'Cython>=3.0.0'
          python -m pip install --no-build-isolation --no-use-pep517 lightfm==1.17
          python -m pip install -r ml/requirements.txt

      - name: Run recommendation training
        run: |
          args=(--require-native-models --lookback-days "$LOOKBACK_DAYS" --min-interactions "$MIN_INTERACTIONS")
          if [ "$PROMOTE" = "true" ]; then
            args+=(--promote)
          fi
          if [ "$DRY_RUN" != "false" ]; then
            args+=(--dry-run)
          fi
          python ml/recommendation/train.py "${args[@]}"
